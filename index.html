<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="タスク帳">
<title>🌸 タスク帳</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --pink: #F472B6;
  --pink-light: #FDF2F8;
  --pink-mid: #FBCFE8;
  --pink-dark: #BE185D;
  --lav: #A78BFA;
  --lav-light: #F5F3FF;
  --lav-mid: #DDD6FE;
  --mint: #34D399;
  --mint-light: #ECFDF5;
  --amber: #FBBF24;
  --amber-light: #FFFBEB;
  --red: #F87171;
  --red-light: #FEF2F2;
  --red-dark: #DC2626;
  --bg: #FFF9FB;
  --card: #FFFFFF;
  --text: #1F1B2E;
  --text2: #6B7280;
  --text3: #9CA3AF;
  --border: rgba(244,114,182,0.18);
  --radius: 16px;
  --radius-sm: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
}

/* ── Header ── */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 10px;
  padding-top: max(14px, env(safe-area-inset-top, 14px));
  flex-shrink: 0;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.app-title { font-size: 20px; font-weight: 700; color: var(--pink-dark); letter-spacing: -0.5px; }
.header-date { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* ── Nav ── */
.nav {
  display: flex;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.nav-btn {
  flex: 1;
  padding: 10px 4px 8px;
  border: none;
  background: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  position: relative;
  transition: opacity .15s;
}
.nav-btn:active { opacity: .7; }
.nav-icon { font-size: 18px; line-height: 1; }
.nav-label { font-size: 10px; color: var(--text3); font-family: 'Noto Sans JP', sans-serif; }
.nav-btn.active .nav-label { color: var(--pink-dark); font-weight: 700; }
.nav-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 2.5px;
  background: var(--pink);
  border-radius: 2px 2px 0 0;
}
.nav-badge {
  position: absolute;
  top: 6px; right: calc(50% - 16px);
  background: var(--red);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  min-width: 16px;
  height: 16px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
  font-family: 'Noto Sans JP', sans-serif;
}

/* ── Pages ── */
.pages { flex: 1; overflow: hidden; position: relative; }
.page {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 12px calc(80px + var(--safe-bottom));
  display: none;
}
.page.active { display: block; }

/* ── Today Hero ── */
.today-hero {
  background: linear-gradient(135deg, #FDF2F8 0%, #F5F3FF 100%);
  border: 1px solid var(--pink-mid);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.today-big { font-size: 22px; font-weight: 700; color: var(--pink-dark); }
.today-sub { font-size: 12px; color: #9D174D; margin-top: 3px; }

/* ── Stats ── */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
}
.stat-n { font-size: 24px; font-weight: 700; }
.stat-l { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* ── Section ── */
.section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  letter-spacing: .8px;
  text-transform: uppercase;
  margin: 14px 0 8px;
}

/* ── Item Card ── */
.item-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 12px 10px;
  margin-bottom: 8px;
  border-left: 4px solid var(--pink);
  position: relative;
  transition: opacity .2s;
}
.item-card.urgent { border-left-color: var(--red); }
.item-card.done { border-left-color: var(--mint); opacity: .6; }
.item-card.done .ic-title { text-decoration: line-through; color: var(--text2); }

.ic-row { display: flex; align-items: flex-start; gap: 10px; }
.ic-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--pink);
  flex-shrink: 0;
  margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all .15s;
  font-size: 12px;
  -webkit-tap-highlight-color: transparent;
}
.ic-check:active { transform: scale(0.9); }
.ic-check.checked { background: var(--mint); border-color: var(--mint); color: #fff; }
.ic-check.coupon-check { border-color: var(--amber); }
.ic-check.coupon-check.checked { background: var(--amber); border-color: var(--amber); }
.ic-body { flex: 1; min-width: 0; }
.ic-title { font-size: 14px; font-weight: 500; line-height: 1.4; color: var(--text); }
.ic-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 20px;
  font-weight: 500;
  white-space: nowrap;
}
.b-type { background: var(--lav-light); color: #5B21B6; }
.b-due { background: #FFF7ED; color: #92400E; }
.b-urgent { background: var(--red-light); color: var(--red-dark); }
.b-soon { background: var(--amber-light); color: #78350F; }
.b-ok { background: var(--mint-light); color: #065F46; }
.b-coupon { background: var(--amber-light); color: #78350F; }
.b-shop { background: #F9FAFB; color: var(--text2); border: 1px solid #E5E7EB; }
.b-memo { background: var(--lav-light); color: #4C1D95; }
.b-done-tag { background: var(--mint-light); color: #065F46; }

/* ── Calendar ── */
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.cal-title { font-size: 16px; font-weight: 700; color: var(--text); }
.cal-nav-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  font-size: 16px;
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
}
.cal-nav-btn:active { background: var(--pink-light); }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 6px;
  margin-bottom: 14px;
}
.cal-dow {
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 0 6px;
  color: var(--text3);
}
.cal-day {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 4px 2px;
  border-radius: 10px;
  cursor: pointer;
  min-height: 44px;
  justify-content: flex-start;
  gap: 2px;
  transition: background .1s;
}
.cal-day:active { background: var(--pink-light) !important; }
.cal-day-num { font-size: 13px; line-height: 1.4; color: var(--text2); }
.cal-day.today .cal-day-num {
  background: var(--pink);
  color: #fff;
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}
.cal-day.selected { background: var(--pink-light); outline: 2px solid var(--pink-mid); }
.cal-day.other-month .cal-day-num { color: var(--text3); opacity: .5; }
.cal-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; max-width: 26px; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; }

.sel-day-header {
  font-size: 14px;
  font-weight: 700;
  color: var(--pink-dark);
  margin-bottom: 10px;
  padding: 8px 12px;
  background: var(--pink-light);
  border-radius: var(--radius-sm);
}

/* ── Filter chips ── */
.filter-row { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--text2);
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
  transition: all .15s;
}
.chip:active { opacity: .7; }
.chip.active { background: var(--pink-light); border-color: var(--pink); color: var(--pink-dark); }

/* ── FAB ── */
.fab-area {
  position: fixed;
  bottom: calc(64px + var(--safe-bottom) + 12px);
  right: 16px;
  z-index: 50;
}
.fab {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--pink);
  border: none;
  color: #fff;
  font-size: 26px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(244,114,182,.4);
  transition: transform .15s, box-shadow .15s;
}
.fab:active { transform: scale(0.93); box-shadow: 0 2px 8px rgba(244,114,182,.3); }

/* ── Bottom nav bar space ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}

/* ── Modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(31,27,46,.45);
  z-index: 200;
  display: flex;
  align-items: flex-end;
}
.modal-sheet {
  background: var(--card);
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-height: 92vh;
  overflow-y: auto;
  padding: 0 16px calc(20px + var(--safe-bottom));
  animation: slideUp .25s cubic-bezier(.32,0,.67,0);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle {
  width: 36px; height: 4px;
  background: #E5E7EB;
  border-radius: 2px;
  margin: 12px auto 16px;
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
.form-row { margin-bottom: 12px; }
.form-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; font-weight: 500; }
.form-input {
  width: 100%;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: 1.5px solid #E5E7EB;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  background: #FAFAFA;
  color: var(--text);
  -webkit-appearance: none;
  transition: border-color .15s;
}
.form-input:focus { outline: none; border-color: var(--pink); background: #fff; }
textarea.form-input { resize: none; height: 60px; }
.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.type-btn {
  padding: 9px 8px;
  border-radius: 10px;
  border: 1.5px solid #E5E7EB;
  font-size: 12px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  background: #FAFAFA;
  color: var(--text2);
  text-align: center;
  transition: all .15s;
}
.type-btn:active { opacity: .7; }
.type-btn.selected { border-color: var(--pink); background: var(--pink-light); color: var(--pink-dark); font-weight: 700; }
.modal-actions { display: flex; gap: 8px; margin-top: 18px; }
.btn-cancel {
  flex: 1; padding: 12px;
  border-radius: var(--radius-sm);
  border: 1.5px solid #E5E7EB;
  background: #FAFAFA;
  color: var(--text2);
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
}
.btn-save {
  flex: 2; padding: 12px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--pink);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
}
.btn-save:active { opacity: .85; }
.btn-cancel:active { opacity: .7; }

/* ── Empty ── */
.empty { text-align: center; padding: 40px 16px; color: var(--text3); font-size: 14px; line-height: 1.8; }
.empty-icon { font-size: 36px; display: block; margin-bottom: 8px; }

/* ── Utility ── */
.mt-auto { margin-top: auto; }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="app-title">🌸 タスク帳</div>
    </div>
    <div class="header-date" id="header-date"></div>
  </div>

  <!-- Pages -->
  <div class="pages">
    <div class="page active" id="page-today"></div>
    <div class="page" id="page-calendar"></div>
    <div class="page" id="page-tasks"></div>
    <div class="page" id="page-coupons"></div>
  </div>

  <!-- FAB -->
  <div class="fab-area">
    <button class="fab" id="fab-btn" onclick="openModal()">+</button>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav nav" id="bottom-nav">
    <button class="nav-btn active" data-page="today" onclick="showPage('today')">
      <span class="nav-icon">🌸</span>
      <span class="nav-label">今日</span>
    </button>
    <button class="nav-btn" data-page="calendar" onclick="showPage('calendar')">
      <span class="nav-icon">📅</span>
      <span class="nav-label">カレンダー</span>
    </button>
    <button class="nav-btn" data-page="tasks" onclick="showPage('tasks')">
      <span class="nav-icon">📋</span>
      <span class="nav-label">タスク</span>
      <span class="nav-badge" id="badge-tasks" style="display:none"></span>
    </button>
    <button class="nav-btn" data-page="coupons" onclick="showPage('coupons')">
      <span class="nav-icon">🎟️</span>
      <span class="nav-label">クーポン</span>
      <span class="nav-badge" id="badge-coupons" style="display:none"></span>
    </button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const TYPES = [
  {id:"work",    label:"💼 仕事",      color:"#5B21B6", bg:"#F5F3FF"},
  {id:"personal",label:"🏠 プライベート",color:"#065F46", bg:"#ECFDF5"},
  {id:"health",  label:"💊 健康",      color:"#92400E", bg:"#FFF7ED"},
  {id:"study",   label:"📚 勉強",      color:"#9D174D", bg:"#FDF2F8"},
  {id:"shopping",label:"🛒 買い物",    color:"#78350F", bg:"#FFFBEB"},
  {id:"other",   label:"🌟 その他",    color:"#1E1B4B", bg:"#EEF2FF"},
];

let tasks   = JSON.parse(localStorage.getItem("tsk_v3_tasks")   || "[]");
let coupons = JSON.parse(localStorage.getItem("tsk_v3_coupons") || "[]");
let page    = "today";
let calYear, calMonth, selDay = null;
let modalMode = "task";
let selType = "work";
let taskFilter = "all", couponFilter = "all";

const save = () => {
  localStorage.setItem("tsk_v3_tasks",   JSON.stringify(tasks));
  localStorage.setItem("tsk_v3_coupons", JSON.stringify(coupons));
};

const now = new Date();
const todayStr = () => now.toISOString().split("T")[0];
const pad = n => String(n).padStart(2,"0");
const dateStr = (y,m,d) => `${y}-${pad(m)}-${pad(d)}`;
const fmtDate = s => { if(!s)return ""; const [y,m,d]=s.split("-"); return `${parseInt(m)}/${parseInt(d)}`; };
const fmtFull = s => { if(!s)return ""; const [y,m,d]=s.split("-"); return `${y}年${parseInt(m)}月${parseInt(d)}日`; };
const daysLeft = s => { if(!s)return null; const d=new Date(s),t=new Date(todayStr()); return Math.round((d-t)/86400000); };
const addDays = n => { const d=new Date(now); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; };

calYear  = now.getFullYear();
calMonth = now.getMonth() + 1;

/* ── Seed data ── */
if (!tasks.length && !coupons.length) {
  tasks = [
    {id:1, title:"企画書を提出する", type:"work",     memo:"第3回会議用", added:addDays(-4), due:addDays(3),  decided:addDays(-5), done:false, doneDate:null},
    {id:2, title:"歯医者の予約をする",type:"health",   memo:"",            added:addDays(-2), due:addDays(8),  decided:null,        done:false, doneDate:null},
    {id:3, title:"英語テキスト購入",  type:"shopping", memo:"TOEIC対策用", added:addDays(-7), due:null,        decided:null,        done:true,  doneDate:addDays(-3)},
    {id:4, title:"レポート課題",     type:"study",    memo:"5000字",      added:addDays(-12),due:addDays(-2), decided:null,        done:false, doneDate:null},
    {id:5, title:"ジムに行く",       type:"health",   memo:"",            added:todayStr(),  due:todayStr(),  decided:null,        done:false, doneDate:null},
  ];
  coupons = [
    {id:1, title:"スタバ誕生日クーポン",shop:"スターバックス",discount:"ドリンク1杯無料",expiry:todayStr(),     added:addDays(-5), memo:"アプリ提示",         used:false},
    {id:2, title:"Amazon割引クーポン",  shop:"Amazon",      discount:"500円OFF",       expiry:addDays(4),     added:addDays(-3), memo:"3000円以上の購入", used:false},
    {id:3, title:"ユニクロクーポン",    shop:"ユニクロ",    discount:"20%OFF",         expiry:addDays(10),    added:addDays(-1), memo:"",                  used:false},
    {id:4, title:"マクドナルドクーポン",shop:"マクドナルド",discount:"バーガー100円引き",expiry:addDays(-3),   added:addDays(-10),memo:"",                  used:false},
  ];
  save();
}

/* ── Render helpers ── */
function taskCard(t) {
  const tp   = TYPES.find(x => x.id === t.type) || TYPES[5];
  const dl   = daysLeft(t.due);
  const over = !t.done && t.due && t.due < todayStr();
  const idx  = tasks.indexOf(t);
  let dlBadge = "";
  if (t.due) {
    const cls  = over ? "b-urgent" : dl === 0 ? "b-urgent" : dl <= 3 ? "b-soon" : "b-due";
    const lbl  = over ? `${Math.abs(dl)}日超過 ⚠️` : dl === 0 ? "今日まで！" : `あと${dl}日`;
    dlBadge = `<span class="badge ${cls}">⏰ ${lbl}</span>`;
  }
  return `<div class="item-card ${t.done?"done":""} ${over?"urgent":""}">
    <div class="ic-row">
      <div class="ic-check ${t.done?"checked":""}" onclick="toggleTask(${idx})">${t.done?"✓":""}</div>
      <div class="ic-body">
        <div class="ic-title">${t.title}</div>
        <div class="ic-badges">
          <span class="badge b-type" style="background:${tp.bg};color:${tp.color}">${tp.label}</span>
          ${dlBadge}
          ${t.decided ? `<span class="badge b-ok">✅ 決定 ${fmtDate(t.decided)}</span>` : ""}
          ${t.memo    ? `<span class="badge b-memo">${t.memo.slice(0,20)}</span>` : ""}
          ${t.done    ? `<span class="badge b-done-tag">完了 ${fmtDate(t.doneDate)}</span>` : ""}
        </div>
      </div>
    </div>
  </div>`;
}

function couponCard(c) {
  const dl   = daysLeft(c.expiry);
  const over = !c.used && c.expiry && c.expiry < todayStr();
  const idx  = coupons.indexOf(c);
  let dlBadge = "";
  if (c.expiry) {
    const cls = over ? "b-urgent" : dl === 0 ? "b-urgent" : dl <= 3 ? "b-soon" : "b-coupon";
    const lbl = over ? `期限切れ ${Math.abs(dl)}日前` : dl === 0 ? "今日まで！" : `あと${dl}日`;
    dlBadge = `<span class="badge ${cls}">🗓 ${lbl}</span>`;
  }
  return `<div class="item-card ${c.used?"done":""} ${over?"urgent":""}">
    <div class="ic-row">
      <div class="ic-check coupon-check ${c.used?"checked":""}" onclick="toggleCoupon(${idx})">${c.used?"✓":""}</div>
      <div class="ic-body">
        <div class="ic-title">${c.title}</div>
        <div class="ic-badges">
          <span class="badge b-coupon">🎟️ クーポン</span>
          ${c.discount ? `<span class="badge b-ok">${c.discount}</span>` : ""}
          ${dlBadge}
          ${c.shop ? `<span class="badge b-shop">${c.shop}</span>` : ""}
          ${c.memo ? `<span class="badge b-memo">${c.memo.slice(0,20)}</span>` : ""}
        </div>
      </div>
    </div>
  </div>`;
}

/* ── Page: Today ── */
function renderToday() {
  const td = todayStr();
  const wdays = ["日","月","火","水","木","金","土"];
  const wd = wdays[now.getDay()];

  const overdueTasks  = tasks.filter(t => !t.done && t.due && t.due < td);
  const todayTasks    = tasks.filter(t => !t.done && t.due === td);
  const todayCoupons  = coupons.filter(c => !c.used && c.expiry === td);
  const soonCoupons   = coupons.filter(c => { const d=daysLeft(c.expiry); return !c.used && d !== null && d > 0 && d <= 7; });
  const total = overdueTasks.length + todayTasks.length + todayCoupons.length + soonCoupons.length;

  const doneCnt   = tasks.filter(t => t.done && t.doneDate === td).length;
  const pendCnt   = tasks.filter(t => !t.done && t.due && t.due <= td).length;
  const cpnCnt    = coupons.filter(c => { const d=daysLeft(c.expiry); return !c.used && d !== null && d <= 7 && d >= 0; }).length;
  const taskLeft  = tasks.filter(t => !t.done).length;

  let h = `<div class="today-hero">
    <div class="today-big">${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${wd}）</div>
    <div class="today-sub">${total > 0 ? `今日やること ${total}件あります` : "今日はすべて完了！🎉"}</div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-n" style="color:#059669">${doneCnt}</div><div class="stat-l">今日完了</div></div>
    <div class="stat-card"><div class="stat-n" style="color:#DC2626">${pendCnt}</div><div class="stat-l">期限切れ</div></div>
    <div class="stat-card"><div class="stat-n" style="color:#BE185D">${taskLeft}</div><div class="stat-l">残タスク</div></div>
    <div class="stat-card"><div class="stat-n" style="color:#B45309">${cpnCnt}</div><div class="stat-l">期限近クーポン</div></div>
  </div>`;

  if (overdueTasks.length)  { h += `<div class="section-label">⚠️ 期限切れ</div>`;         overdueTasks.forEach(t => h += taskCard(t)); }
  if (todayCoupons.length)  { h += `<div class="section-label">🚨 今日期限のクーポン</div>`; todayCoupons.forEach(c => h += couponCard(c)); }
  if (todayTasks.length)    { h += `<div class="section-label">📌 今日のタスク</div>`;       todayTasks.forEach(t => h += taskCard(t)); }
  if (soonCoupons.length)   { h += `<div class="section-label">🎟️ まもなく期限</div>`;       soonCoupons.forEach(c => h += couponCard(c)); }
  if (!total)               { h += `<div class="empty"><span class="empty-icon">🌸</span>今日のやることはありません！<br>ゆっくり休んで♪</div>`; }

  document.getElementById("page-today").innerHTML = h;
}

/* ── Page: Calendar ── */
function renderCalendar() {
  const months = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  const firstDow = new Date(calYear, calMonth-1, 1).getDay();
  const daysInMon = new Date(calYear, calMonth, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth-1, 0).getDate();

  const evMap = {};
  const mark = (s, color, urgent) => {
    if (!s) return;
    if (!evMap[s]) evMap[s] = { dots: [], urgent: false };
    evMap[s].dots.push(color);
    if (urgent) evMap[s].urgent = true;
  };
  tasks.filter(t => !t.done).forEach(t => {
    const over = t.due && t.due < todayStr();
    if (t.due)     mark(t.due,     over ? "#F87171" : "#A78BFA", over);
    if (t.decided) mark(t.decided, "#34D399", false);
  });
  coupons.filter(c => !c.used).forEach(c => {
    const dl = daysLeft(c.expiry);
    const over = dl !== null && dl <= 0;
    if (c.expiry) mark(c.expiry, over ? "#F87171" : "#FBBF24", over);
  });

  let h = `<div class="cal-header">
    <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
    <span class="cal-title">${calYear}年 ${months[calMonth-1]}</span>
    <button class="cal-nav-btn" onclick="calNav(1)">›</button>
  </div>
  <div class="cal-grid">
    ${["日","月","火","水","木","金","土"].map((d,i)=>`<div class="cal-dow" style="${i===0?"color:#DC2626":i===6?"color:#2563EB":""}">${d}</div>`).join("")}`;

  for (let i = 0; i < firstDow; i++) {
    const d = daysInPrev - firstDow + i + 1;
    h += `<div class="cal-day other-month"><span class="cal-day-num">${d}</span></div>`;
  }
  for (let d = 1; d <= daysInMon; d++) {
    const ds = dateStr(calYear, calMonth, d);
    const isToday = ds === todayStr();
    const isSel   = ds === selDay;
    const ev = evMap[ds];
    const dots = ev ? ev.dots.slice(0,4).map(c=>`<div class="cal-dot" style="background:${c}"></div>`).join("") : "";
    h += `<div class="cal-day ${isToday?"today":""} ${isSel?"selected":""}" onclick="selectDay('${ds}')">
      <span class="cal-day-num">${d}</span>
      ${dots ? `<div class="cal-dots">${dots}</div>` : ""}
    </div>`;
  }
  const remain = (7 - ((firstDow + daysInMon) % 7)) % 7;
  for (let i = 1; i <= remain; i++) h += `<div class="cal-day other-month"><span class="cal-day-num">${i}</span></div>`;
  h += `</div>`;

  if (selDay) {
    const dayTasks   = tasks.filter(t => t.due === selDay || t.decided === selDay);
    const dayCoupons = coupons.filter(c => c.expiry === selDay);
    h += `<div class="sel-day-header">📌 ${fmtFull(selDay)}</div>`;
    if (!dayTasks.length && !dayCoupons.length) {
      h += `<div class="empty"><span class="empty-icon">📭</span>この日の予定はありません</div>`;
    }
    dayTasks.forEach(t => h += taskCard(t));
    dayCoupons.forEach(c => h += couponCard(c));
  } else {
    h += `<div class="empty" style="padding:20px 16px;font-size:12px;color:var(--text3)">日付をタップして確認できます</div>`;
  }

  document.getElementById("page-calendar").innerHTML = h;
}

/* ── Page: Tasks ── */
function renderTasks() {
  const td = todayStr();
  let list = tasks;
  if (taskFilter === "active")  list = list.filter(t => !t.done);
  if (taskFilter === "done")    list = list.filter(t => t.done);
  if (taskFilter === "overdue") list = list.filter(t => !t.done && t.due && t.due < td);
  if (taskFilter === "today")   list = list.filter(t => !t.done && t.due === td);

  let h = `<div class="filter-row">
    ${[["all","すべて"],["active","未完了"],["today","今日"],["overdue","期限切れ"],["done","完了済み"]].map(
      ([v,l]) => `<button class="chip ${taskFilter===v?"active":""}" onclick="setTaskFilter('${v}')">${l}</button>`
    ).join("")}
  </div>`;
  if (!list.length) h += `<div class="empty"><span class="empty-icon">📋</span>該当するタスクはありません</div>`;
  list.forEach(t => h += taskCard(t));
  document.getElementById("page-tasks").innerHTML = h;
}

/* ── Page: Coupons ── */
function renderCoupons() {
  let list = coupons;
  if (couponFilter === "active") list = list.filter(c => !c.used && (!c.expiry || daysLeft(c.expiry) >= 0));
  if (couponFilter === "soon")   list = list.filter(c => { const d=daysLeft(c.expiry); return !c.used && d!==null && d>=0 && d<=7; });
  if (couponFilter === "used")   list = list.filter(c => c.used);
  if (couponFilter === "expired")list = list.filter(c => !c.used && c.expiry && c.expiry < todayStr());

  let h = `<div class="filter-row">
    ${[["all","すべて"],["active","有効"],["soon","7日以内"],["expired","期限切れ"],["used","使用済み"]].map(
      ([v,l]) => `<button class="chip ${couponFilter===v?"active":""}" onclick="setCouponFilter('${v}')">${l}</button>`
    ).join("")}
  </div>`;
  if (!list.length) h += `<div class="empty"><span class="empty-icon">🎟️</span>クーポンはありません</div>`;
  list.forEach(c => h += couponCard(c));
  document.getElementById("page-coupons").innerHTML = h;
}

/* ── Modal ── */
function openModal() {
  modalMode = (page === "coupons") ? "coupon" : "task";
  selType = "work";
  renderModal();
  document.getElementById("modal").style.display = "flex";
}
function closeModal() {
  document.getElementById("modal").style.display = "none";
}
function renderModal() {
  const isCoupon = modalMode === "coupon";
  const typeGrid = TYPES.map(t =>
    `<button class="type-btn ${selType===t.id?"selected":""}" onclick="selTypeBtn('${t.id}')">${t.label}</button>`
  ).join("");
  document.getElementById("modal-content").innerHTML = `
    <div class="modal-title">${isCoupon?"🎟️ クーポンを追加":"✏️ タスクを追加"}</div>
    <div class="form-row"><label class="form-label">${isCoupon?"クーポン名":"タスク名"} *</label>
      <input class="form-input" id="f-title" type="text" placeholder="${isCoupon?"例：スタバクーポン":"例：企画書を提出する"}"></div>
    ${isCoupon ? `
      <div class="form-row"><label class="form-label">お店・サービス名</label>
        <input class="form-input" id="f-shop" type="text" placeholder="例：Amazon、コンビニ"></div>
      <div class="form-row"><label class="form-label">割引内容</label>
        <input class="form-input" id="f-discount" type="text" placeholder="例：10%OFF、500円引き"></div>
      <div class="form-row"><label class="form-label">有効期限</label>
        <input class="form-input" id="f-expiry" type="date"></div>
      <div class="form-row"><label class="form-label">メモ</label>
        <textarea class="form-input" id="f-memo" placeholder="使用条件など..."></textarea></div>
    ` : `
      <div class="form-row"><label class="form-label">種類</label>
        <div class="type-grid">${typeGrid}</div></div>
      <div class="form-row"><label class="form-label">メモ</label>
        <textarea class="form-input" id="f-memo" placeholder="詳細・メモ..."></textarea></div>
      <div class="form-row"><label class="form-label">期限</label>
        <input class="form-input" id="f-due" type="date"></div>
      <div class="form-row"><label class="form-label">決定日</label>
        <input class="form-input" id="f-decided" type="date"></div>
    `}
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveItem()">保存する</button>
    </div>`;
}
function selTypeBtn(id) {
  selType = id;
  renderModal();
  document.getElementById("modal").style.display = "flex";
}
function saveItem() {
  const title = document.getElementById("f-title")?.value?.trim();
  if (!title) { document.getElementById("f-title")?.focus(); return; }
  if (modalMode === "coupon") {
    coupons.unshift({
      id: Date.now(), title,
      shop:     document.getElementById("f-shop")?.value?.trim()     || "",
      discount: document.getElementById("f-discount")?.value?.trim() || "",
      expiry:   document.getElementById("f-expiry")?.value           || null,
      memo:     document.getElementById("f-memo")?.value?.trim()     || "",
      added: todayStr(), used: false
    });
  } else {
    tasks.unshift({
      id: Date.now(), title, type: selType,
      memo:    document.getElementById("f-memo")?.value?.trim()    || "",
      due:     document.getElementById("f-due")?.value             || null,
      decided: document.getElementById("f-decided")?.value         || null,
      added: todayStr(), done: false, doneDate: null
    });
  }
  save(); closeModal(); render();
}

/* ── Actions ── */
function toggleTask(i) {
  tasks[i].done = !tasks[i].done;
  tasks[i].doneDate = tasks[i].done ? todayStr() : null;
  save(); render();
}
function toggleCoupon(i) {
  coupons[i].used = !coupons[i].used;
  save(); render();
}
function calNav(d) {
  calMonth += d;
  if (calMonth > 12) { calMonth = 1; calYear++; }
  if (calMonth < 1)  { calMonth = 12; calYear--; }
  render();
}
function selectDay(d) {
  selDay = selDay === d ? null : d;
  render();
}
function showPage(p) {
  page = p;
  document.querySelectorAll(".nav-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.page === p)
  );
  document.querySelectorAll(".page").forEach(el => el.classList.remove("active"));
  document.getElementById("page-" + p).classList.add("active");
  render();
}
function setTaskFilter(f)   { taskFilter = f;   renderTasks(); }
function setCouponFilter(f) { couponFilter = f;  renderCoupons(); }

/* ── Badges ── */
function updateBadges() {
  const td = todayStr();
  const tc = tasks.filter(t => !t.done && t.due && t.due <= td).length;
  const cc = coupons.filter(c => { const d=daysLeft(c.expiry); return !c.used && d!==null && d<=7 && d>=0; }).length;
  const tb = document.getElementById("badge-tasks");
  const cb = document.getElementById("badge-coupons");
  if (tc > 0) { tb.textContent = tc; tb.style.display = "flex"; } else { tb.style.display = "none"; }
  if (cc > 0) { cb.textContent = cc; cb.style.display = "flex"; } else { cb.style.display = "none"; }
}

/* ── Main render ── */
function render() {
  if (page === "today")    renderToday();
  if (page === "calendar") renderCalendar();
  if (page === "tasks")    renderTasks();
  if (page === "coupons")  renderCoupons();
  updateBadges();
}

/* ── Date header ── */
const wdays = ["日","月","火","水","木","金","土"];
document.getElementById("header-date").textContent =
  `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${wdays[now.getDay()]}）`;

render();
</script>
</body>
